<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Commerce Pulse | 2026 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; }
        #main-chart { width: 100%; height: 500px; padding: 20px; box-sizing: border-box; }
        .nav { padding: 20px; background: #161b22; display: flex; justify-content: space-between; }
        .status-tag { color: #00c853; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <span>YMTEA LABS | 全球商贸脉动</span>
        <span class="status-tag">● LIVE DATA 2026</span>
    </div>
    <div id="main-chart"></div>

    <script>
        var chartDom = document.getElementById('main-chart');
        var myChart = echarts.init(chartDom, 'dark');

        async function fetchData() {
            // 替换为你部署后的 Worker 链接
            const res = await fetch('https://gl.asasasxzc.workers.dev');
            const data = await res.json();
            
            const option = {
                backgroundColor: 'transparent',
                title: { text: '全品类搜索趋势 (全自动监测)', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(i => i.timestamp.slice(11, 16)) },
                yAxis: { type: 'value' },
                series: [{
                    name: 'US Market',
                    data: data.map(i => i.score),
                    type: 'line',
                    smooth: true,
                    areaStyle: { opacity: 0.3 },
                    itemStyle: { color: '#00c853' }
                }]
            };
            myChart.setOption(option);
        }

        fetchData();
        setInterval(fetchData, 60000); // 每分钟刷新一次图表
    </script>
</body>
</html>
