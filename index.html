<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA Radar | 商业决策终端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" async></script>
    <style>
        :root { --accent: #00c853; --bg: #0b0f19; --card: #161b22; --border: #30363d; --text: #8b949e; --gold: #f1e05a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        .app { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(10px); z-index: 1000; }
        .logo { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: 1px; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .card-label { font-size: 0.7rem; color: var(--text); margin-bottom: 5px; }
        .card-val { font-size: 1.2rem; font-weight: 800; font-family: 'Monaco', monospace; }

        .controls { padding: 0 15px 15px; display: flex; flex-direction: column; gap: 12px; }
        .group { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .group-head { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn-flex { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn { background: #21262d; border: 1px solid var(--border); color: #c9d1d9; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
        .btn-gold { color: var(--gold); border-color: var(--gold); }

        .visual { padding: 0 15px; flex: 1; }
        #main-chart { width: 100%; height: 400px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); }
        
        .ai-box { background: #1c2128; border-left: 4px solid var(--accent); padding: 15px; border-radius: 8px; margin: 15px 0 30px; }
        .ai-content { font-size: 0.85rem; line-height: 1.6; color: #e6edf3; }

        .footer { padding: 30px 15px; text-align: center; color: var(--text); font-size: 0.75rem; border-top: 1px solid var(--border); }
        .footer a { color: var(--text); text-decoration: none; margin: 0 10px; }
        
        @media (max-width: 480px) { .card-val { font-size: 1rem; } #main-chart { height: 320px; } }
    </style>
</head>
<body>

<div class="app" id="master-wrap">
    <header>
        <div class="logo" id="admin-entrance">YMTEA RADAR</div>
        <div style="display:flex; gap:8px">
            <button class="btn btn-gold" onclick="capture()">快报</button>
            <button class="btn btn-gold" onclick="handleExport()">导出</button>
        </div>
    </header>

    <div class="grid">
        <div class="card"><div class="card-label">观测板块</div><div id="v-name" class="card-val">--</div></div>
        <div class="card"><div class="card-label">实时指数</div><div id="v-score" class="card-val" style="color:var(--accent)">--</div></div>
        <div class="card"><div class="card-label">权限</div><div id="v-vip" class="card-val" style="font-size:0.8rem">STANDARD</div></div>
    </div>

    <div class="controls">
        <div class="group">
            <div class="group-head"><span>核心科技与能源</span><span id="sync-indicator">就绪</span></div>
            <div class="btn-flex">
                <button class="btn active" onclick="toggleCat('AI流量', this)">AI流量</button>
                <button class="btn" onclick="toggleCat('新能源', this)">新能源</button>
                <button class="btn" onclick="toggleCat('汽车配件', this)">汽车配件</button>
                <button class="btn" onclick="toggleCat('半导体', this)">半导体</button>
                <button class="btn" onclick="toggleCat('金融科技', this)">金融科技</button>
            </div>
        </div>
        
        <div class="group">
            <div class="group-head"><span>消费零售与跨境</span></div>
            <div class="btn-flex">
                <button class="btn" onclick="toggleCat('茶+咖啡', this)">茶+咖啡</button>
                <button class="btn" onclick="toggleCat('服装鞋帽', this)">服装鞋帽</button>
                <button class="btn" onclick="toggleCat('餐饮娱乐', this)">餐饮娱乐</button>
                <button class="btn" onclick="toggleCat('百货零售', this)">百货零售</button>
                <button class="btn" onclick="toggleCat('母婴用品', this)">母婴用品</button>
                <button class="btn" onclick="toggleCat('跨境电商', this)">跨境电商</button>
            </div>
        </div>

        <div class="group">
            <div class="group-head"><span>装修建材与电子</span></div>
            <div class="btn-flex">
                <button class="btn" onclick="toggleCat('装饰装修', this)">装饰装修</button>
                <button class="btn" onclick="toggleCat('建材', this)">建材</button>
                <button class="btn" onclick="toggleCat('消费电子', this)">消费电子</button>
            </div>
        </div>
    </div>

    <div class="visual">
        <div id="main-chart"></div>
        <div class="ai-box">
            <div id="ai-text" class="ai-content">初始化分析引擎...</div>
        </div>
    </div>

    <footer class="footer">
        <div style="margin-bottom:15px">
            <a href="https://ymtea.club">官网</a>
            <a href="https://www.ymtea.club/bbs/">论坛</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637">咨询</a>
        </div>
        <div>© 2026 YMTEA LABS | 全球商贸决策终端</div>
    </footer>
</div>

<script>
    const chart = echarts.init(document.getElementById('main-chart'), 'dark');
    let activeCats = ['AI流量'];
    let isVip = localStorage.getItem('ymtea_vip_status') === 'true';
    let cache = JSON.parse(localStorage.getItem('ymtea_data_cache') || '{}');

    document.getElementById('admin-entrance').onclick = () => {
        const key = prompt("授权码:");
        if(key === 'ymtea888') {
            localStorage.setItem('ymtea_vip_status', 'true');
            location.reload();
        }
    };

    function toggleCat(name, dom) {
        if(activeCats.includes(name)) {
            if(activeCats.length > 1) {
                activeCats = activeCats.filter(c => c !== name);
                dom.classList.remove('active');
            }
        } else {
            activeCats.push(name);
            dom.classList.add('active');
        }
        sync();
    }

    async function sync() {
        const indicator = document.getElementById('sync-indicator');
        indicator.innerText = "同步中...";
        chart.showLoading({ text: '', color: '#00c853', maskColor: 'rgba(11, 15, 25, 0.8)' });
        
        // 手机端关键：8秒超时控制
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        try {
            const tasks = activeCats.map(c => 
                fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(c)}`, {
                    signal: controller.signal,
                    cache: 'no-cache'
                }).then(r => r.json())
            );
            const results = await Promise.all(tasks);
            clearTimeout(timeout);
            
            results.forEach((r, i) => { cache[activeCats[i]] = r; });
            localStorage.setItem('ymtea_data_cache', JSON.stringify(cache));
            render(results);
            indicator.innerText = "已更新";
        } catch (e) {
            clearTimeout(timeout);
            indicator.innerText = "离线模式";
            const cached = activeCats.map(c => cache[c]).filter(Boolean);
            if(cached.length > 0) render(cached);
            else {
                chart.hideLoading();
                document.getElementById('ai-text').innerText = "暂无数据，请检查网络连接。";
            }
        }
    }

    function render(results) {
        chart.hideLoading();
        let series = [];
        let timeLabels = [];
        
        results.forEach((r, idx) => {
            const raw = r.data || [];
            if(raw.length === 0) return;

            if(idx === 0) {
                timeLabels = raw.map(v => {
                    const t = v.timestamp;
                    const parts = t.includes('T') ? t.split('T') : t.split(' ');
                    return parts[1] ? parts[1].slice(0, 5) : '--:--';
                });
            }

            series.push({
                name: activeCats[idx],
                type: 'line', smooth: true, symbol: 'circle', symbolSize: 6,
                data: raw.map(v => v.score)
            });
        });

        if(results.length > 0 && (results[0].data || []).length > 0) {
            const data = results[0].data || [];
            const cur = data[data.length-1].score;
            document.getElementById('v-name').innerText = activeCats[0];
            document.getElementById('v-score').innerText = cur.toFixed(2);
            document.getElementById('v-vip').innerText = isVip ? "VIP PRO" : "STANDARD";
            document.title = `[${cur.toFixed(1)}] YMTEA Radar`;
            document.getElementById('ai-text').innerText = `【${activeCats[0]}】当前指数 ${cur.toFixed(2)}。趋势分析已完成，建议保持商业关注。`;
        }

        chart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { top: 0 },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'category', data: timeLabels, boundaryGap: false },
            yAxis: { type: 'value' },
            series: series
        }, true);
    }

    function capture() {
        alert("正在生成快报海报...");
        html2canvas(document.body).then(canvas => {
            const link = document.createElement('a');
            link.download = `YMTEA_Report.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function handleExport() {
        if(!isVip) alert("🔒 导出功能仅限 VIP。");
        else alert("正在准备商业数据导出...");
    }

    sync();
    setInterval(sync, 10 * 60 * 1000); // 10分钟静默更新
    window.onresize = () => chart.resize();
</script>
</body>
</html>
