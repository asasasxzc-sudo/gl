<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 全球商贸脉动决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: sans-serif; }
        body { display: flex; flex-direction: column; }
        .header { padding: 15px 25px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--accent-color); cursor: pointer; user-select: none; }
        .stats-container { display: flex; gap: 15px; padding: 20px 25px 10px; flex-wrap: wrap; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; flex: 1; min-width: 180px; border: 1px solid var(--border-color); border-left: 4px solid var(--accent-color); }
        .filter-section { padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .cat-btn, .time-btn { background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .cat-btn.active, .time-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .content { flex: 1; padding: 0 25px 20px; display: flex; flex-direction: column; }
        #chart-container { width: 100%; flex: 1; min-height: 400px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        .footer { background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 25px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-gray); text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA CLOUD RADAR</div>
        <div style="font-size: 0.8rem; color: var(--text-gray);">● 边缘实时同步模式</div>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 0.75rem; color: var(--text-gray);">监测品类</div>
            <div id="stat-top-cat" style="font-size: 1.3rem; font-weight: bold; margin-top:5px;">--</div>
        </div>
        <div class="stat-card" style="border-left-color: #2196f3;">
            <div style="font-size: 0.75rem; color: var(--text-gray);">脉动指数</div>
            <div id="stat-avg-score" style="font-size: 1.3rem; font-weight: bold; margin-top:5px;">0</div>
        </div>
        <div class="stat-card" style="border-left-color: #ff9800;">
            <div style="font-size: 0.75rem; color: var(--text-gray);">系统状态</div>
            <div style="font-size: 1.3rem; font-weight: bold; margin-top:5px; color: var(--accent-color);">ONLINE</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <button class="cat-btn" onclick="switchCategory('消费电子', this)">消费电子</button>
            <button class="cat-btn" onclick="switchCategory('家居生活', this)">家居生活</button>
            <button class="cat-btn" onclick="switchCategory('跨境电商', this)">跨境电商</button>
            <button class="cat-btn" onclick="switchCategory('金融科技', this)">金融科技</button>
            <button class="cat-btn active" onclick="switchCategory('AI流量', this)">AI流量</button>
        </div>
        <div class="filter-group">
            <button class="time-btn active">24H</button>
            <button class="time-btn" id="vip-btn">7D (VIP)</button>
        </div>
    </div>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club" target="_blank">官网首页</a>
            <a href="https://www.ymtea.club/bbs/" target="_blank">云茗荟论坛</a>
            <a href="https://vip.ymtea.club" target="_blank">会员中心</a>
        </div>
        <div style="font-size: 0.8rem; color: #484f58;">© 2026 YMTEA LABS.</div>
    </footer>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let currentCat = 'AI流量';
        let clickCount = 0;

        // 管理员逻辑
        document.getElementById('admin-logo').onclick = function() {
            clickCount++;
            if (clickCount >= 5) {
                const pwd = prompt("管理员口令:");
                if (pwd === "ymtea888") {
                    const target = confirm("确定要切换全站 VIP 状态吗？") ? 1 : 0;
                    handleVipToggle(pwd, target);
                } else { alert("口令错误"); }
                clickCount = 0;
            }
        };

        async function handleVipToggle(pwd, target) {
            try {
                await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                    method: 'POST',
                    headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: target })
                });
                location.reload(); 
            } catch(e) { alert("通讯失败"); }
        }

        async function fetchData(category) {
            try {
                myChart.showLoading({ text: '同步数据...', maskColor: 'rgba(11, 15, 25, 0.8)' });
                const res = await fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(category)}`);
                const result = await res.json();
                
                // 自动识别数据结构：不管是数组还是对象都兼容
                const chartData = result.data || result;
                const isUnlocked = result.vipUnlocked || false;

                if (!chartData || chartData.length === 0) {
                    myChart.hideLoading();
                    myChart.showLoading({ text: `[${category}] 暂无数据`, textColor: '#8b949e', maskColor: 'transparent' });
                    return;
                }

                // 更新 UI
                document.getElementById('stat-top-cat').innerText = category;
                document.getElementById('stat-avg-score').innerText = chartData[chartData.length - 1].score;

                // VIP 按钮状态
                const vBtn = document.getElementById('vip-btn');
                vBtn.style.opacity = isUnlocked ? "1" : "0.4";
                vBtn.innerText = isUnlocked ? "7D (已解锁)" : "7D (VIP)";
                vBtn.onclick = isUnlocked ? () => alert("已进入历史模式") : () => alert("💡 请联系管理员解锁 VIP 权限");

                renderChart(chartData, category);
            } catch (err) {
                console.error("Fetch 报错:", err);
                myChart.showLoading({ text: '数据链路中断: ' + err.message, textColor: '#ff4444' });
            }
        }

        function renderChart(data, category) {
            myChart.hideLoading();
            myChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                xAxis: {
                    type: 'category',
                    // 修正时间解析逻辑：兼容 "2026-04-14 10:05:06" 格式
                    data: data.map(i => {
                        if (!i.timestamp) return '--:--';
                        const timePart = i.timestamp.includes(' ') ? i.timestamp.split(' ')[1] : i.timestamp.split('T')[1];
                        return timePart ? timePart.slice(0, 5) : '--:--';
                    }),
                    axisLine: { lineStyle: { color: '#30363d' } }
                },
                yAxis: { type: 'value', min: 'dataMin', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
                series: [{
                    name: category, type: 'line', smooth: true, symbolSize: 8,
                    data: data.map(i => i.score),
                    lineStyle: { width: 4, color: '#00c853' },
                    areaStyle: { color: 'rgba(0, 200, 83, 0.2)' }
                }]
            }, true);
        }

        function switchCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchData(cat);
        }

        fetchData(currentCat);
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
