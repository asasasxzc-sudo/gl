<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 全球商贸脉动决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --accent: #00c853; --bg: #0b0f19; --card: #161b22; --border: #30363d; --text: #8b949e; --gold: #f1e05a; --up: #ff3d00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Monaco', 'Lucida Console', monospace; overflow-x: hidden; }
        .app { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(12px); z-index: 1000; }
        .logo-wrap { display: flex; align-items: center; gap: 15px; }
        .back-link { text-decoration: none; color: var(--text); font-size: 0.75rem; border: 1px solid var(--border); padding: 5px 12px; border-radius: 4px; display: flex; align-items: center; gap: 5px; transition: 0.3s; background: rgba(255,255,255,0.02); }
        .back-link:hover { border-color: var(--accent); color: #fff; background: rgba(0,200,83,0.1); }

        .logo { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; position: relative; }
        .card-label { font-size: 0.7rem; color: var(--text); font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .trend-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; margin-left: 10px; font-weight: bold; }

        .controls { padding: 0 25px 25px; display: flex; flex-direction: column; gap: 20px; }
        .group { background: rgba(255,255,255,0.01); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .group-head { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; text-transform: uppercase; }
        .btn-flex { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn { background: #1c2128; border: 1px solid var(--border); color: #8b949e; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); color: #fff; }
        .btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,200,83,0.2); }
        .btn-gold { color: var(--gold); border-color: var(--gold); }

        .visual { padding: 0 25px; flex: 1; display: flex; flex-direction: column; gap: 20px; }
        #main-chart { width: 100%; height: 450px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); }
        
        .ai-box { background: linear-gradient(135deg, #1c2128 0%, #0b0f19 100%); border: 1px solid var(--border); padding: 25px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .ai-title { display: flex; align-items: center; gap: 10px; color: var(--accent); font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; }
        .ai-content { font-size: 0.85rem; line-height: 1.8; color: #c9d1d9; }

        .link-global { text-align: right; padding: 10px 0 30px; }
        .link-global a { color: var(--accent); font-size: 0.8rem; text-decoration: none; font-weight: bold; border-bottom: 1px solid transparent; padding-bottom: 2px; }
        .link-global a:hover { border-color: var(--accent); }

        .footer { padding: 60px 25px; border-top: 1px solid var(--border); text-align: center; color: var(--text); font-size: 0.75rem; }
        .footer a { color: #c9d1d9; text-decoration: none; margin: 0 15px; }
        .footer a:hover { color: var(--accent); }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } #main-chart { height: 350px; } }
    </style>
</head>
<body>

<div class="app" id="master-wrap">
    <header>
        <div class="logo-wrap">
            <a href="https://vip.ymtea.club" class="back-link">🔙 返回云茗荟</a>
            <div class="status-dot"></div>
            <div class="logo">YMTEA RADAR MASTER</div>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn btn-gold" onclick="capture()">生成快报</button>
            <button class="btn btn-gold" onclick="handleExport()">CSV 导出</button>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-label">核心观测节点 / NODE</div>
            <div id="v-name" class="card-val">SELECTING...</div>
        </div>
        <div class="card">
            <div class="card-label">实时脉动指数 / PULSE</div>
            <div style="display:flex; align-items:center">
                <div id="v-score" class="card-val">--</div>
                <div id="v-trend" class="trend-tag">--</div>
            </div>
        </div>
        <div class="card" style="border-left: 4px solid var(--gold)">
            <div class="card-label">商业决策权限 / AUTH</div>
            <div id="v-vip" class="card-val" style="color:var(--gold)">ENTERPRISE PRO</div>
        </div>
    </div>

    <div class="controls">
        <div class="group">
            <div class="group-head"><span>工业 · 能源 · 科技高地</span><span id="sync-indicator">等待指令...</span></div>
            <div class="btn-flex">
                <button class="btn active" onclick="toggleCat('AI流量', this)">AI流量</button>
                <button class="btn" onclick="toggleCat('新能源', this)">新能源</button>
                <button class="btn" onclick="toggleCat('汽车配件', this)">汽车配件</button>
                <button class="btn" onclick="toggleCat('半导体', this)">半导体</button>
                <button class="btn" onclick="toggleCat('机器人/自动化', this)">机器人/自动化</button>
                <button class="btn" onclick="toggleCat('储能系统', this)">储能系统</button>
                <button class="btn" onclick="toggleCat('低空经济', this)">低空经济</button>
            </div>
        </div>
        
        <div class="group">
            <div class="group-head"><span>生活消费 · 零售 · 跨境</span></div>
            <div class="btn-flex">
                <button class="btn" onclick="toggleCat('茶+咖啡', this)">茶+咖啡</button>
                <button class="btn" onclick="toggleCat('服装鞋帽', this)">服装鞋帽</button>
                <button class="btn" onclick="toggleCat('餐饮娱乐', this)">餐饮娱乐</button>
                <button class="btn" onclick="toggleCat('百货零售', this)">百货零售</button>
                <button class="btn" onclick="toggleCat('跨境电商', this)">跨境电商</button>
                <button class="btn" onclick="toggleCat('宠物经济', this)">宠物经济</button>
                <button class="btn" onclick="toggleCat('户外运动', this)">户外运动</button>
                <button class="btn" onclick="toggleCat('美妆护肤', this)">美妆护肤</button>
            </div>
        </div>

        <div class="group">
            <div class="group-head"><span>装饰装修 · 基建 · 电子</span></div>
            <div class="btn-flex">
                <button class="btn" onclick="toggleCat('装饰装修', this)">装饰装修</button>
                <button class="btn" onclick="toggleCat('建材', this)">建材</button>
                <button class="btn" onclick="toggleCat('消费电子', this)">消费电子</button>
                <button class="btn" onclick="toggleCat('智能家居', this)">智能家居</button>
                <button class="btn" onclick="toggleCat('五金机械', this)">五金机械</button>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center">
            <div class="btn-flex">
                <button class="btn active">24H 实时监测</button>
                <button class="btn btn-gold" onclick="alert('深度报表生成中...')">7D 趋势全景</button>
            </div>
            <div style="font-size:0.65rem; color:var(--text)">节点每 15 分钟自动强制对时</div>
        </div>
    </div>

    <div class="visual">
        <div id="main-chart"></div>
        <div class="ai-box">
            <div class="ai-title">🛡️ YMTEA 商业决策智能分析引擎</div>
            <div id="ai-text" class="ai-content">初始化分析组件中...</div>
        </div>
        <div class="link-global">
            <a href="https://s.ymtea.club" target="_blank">智联全球：探索更多商贸节点 🌐</a>
        </div>
    </div>

    <footer class="footer">
        <div style="margin-bottom:25px">
            <a href="https://ymtea.club">Ymtea Shop</a>
            <a href="https://www.ymtea.club/bbs/">情报论坛</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637">商业授权</a>
        </div>
        <div style="opacity:0.5; letter-spacing:1px">© 2026 YMTEA LABS | GLOBAL TRADE INTELLIGENCE TERMINAL</div>
    </footer>
</div>

<script>
    const chart = echarts.init(document.getElementById('main-chart'), 'dark');
    let activeCats = ['AI流量'];
    let cache = JSON.parse(localStorage.getItem('ymtea_v2_cache') || '{}');

    // --- 高保真模拟数据算法 ---
    function generateSmartMock(category) {
        const data = [];
        const now = new Date();
        let base = 60, vol = 8;
        
        // 针对品类特性调整基准
        if(category.includes('AI') || category.includes('新能源')) { base = 75; vol = 15; }
        if(category.includes('建材') || category.includes('五金')) { base = 45; vol = 4; }

        for (let i = 24; i >= 0; i--) {
            const time = new Date(now.getTime() - i * 60 * 60 * 1000);
            const ts = time.toISOString().split('.')[0].replace('T', ' ');
            // 模拟正态分布波动
            const noise = (Math.sin(i * 0.5) * vol) + (Math.random() * vol);
            data.push({ timestamp: ts, score: Math.max(10, base + noise) });
        }
        return { data };
    }

    async function sync() {
        document.getElementById('sync-indicator').innerText = "正在接入边缘节点...";
        chart.showLoading({ text: '', color: '#00c853', maskColor: 'rgba(11,15,25,0.7)' });
        
        try {
            const tasks = activeCats.map(async (c) => {
                try {
                    const r = await fetch(`https://gl.ymtea.club?category=${encodeURIComponent(c)}`).then(res => res.json());
                    return (r.data && r.data.length > 3) ? r : generateSmartMock(c);
                } catch (e) {
                    return generateSmartMock(c);
                }
            });

            const results = await Promise.all(tasks);
            results.forEach((r, i) => { cache[activeCats[i]] = r; });
            localStorage.setItem('ymtea_v2_cache', JSON.stringify(cache));
            render(results);
            document.getElementById('sync-indicator').innerText = "节点同步成功";
        } catch (e) {
            document.getElementById('sync-indicator').innerText = "离线安全模式";
        }
    }

    function render(results) {
        chart.hideLoading();
        let series = [];
        let timeLabels = [];
        
        results.forEach((r, idx) => {
            const raw = r.data || [];
            if(idx === 0) timeLabels = raw.map(v => v.timestamp.split(' ')[1].slice(0, 5));
            
            series.push({
                name: activeCats[idx],
                type: 'line', smooth: true, showSymbol: false,
                lineStyle: { width: 3, shadowBlur: 10, shadowColor: 'rgba(0,200,83,0.3)' },
                areaStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        {offset: 0, color: idx === 0 ? 'rgba(0,200,83,0.4)' : 'rgba(59,130,246,0.2)'},
                        {offset: 1, color: 'transparent'}
                    ]) 
                },
                data: raw.map(v => v.score)
            });
        });

        if(results.length > 0) {
            const data = results[0].data;
            const cur = data[data.length-1].score;
            const max = Math.max(...data.map(v => v.score));
            const avg = data.reduce((a,b)=>a+b.score,0)/data.length;
            const diff = (((cur - data[0].score)/data[0].score)*100).toFixed(2);
            
            document.getElementById('v-name').innerText = activeCats[0];
            document.getElementById('v-score').innerText = cur.toFixed(2);
            
            const trendDom = document.getElementById('v-trend');
            trendDom.innerText = `${diff > 0 ? '强势扩张' : '高位整理'} ${Math.abs(diff)}%`;
            trendDom.style.background = diff > 0 ? 'rgba(255,61,0,0.15)' : 'rgba(0,200,83,0.15)';
            trendDom.style.color = diff > 0 ? '#ff3d00' : '#00c853';

            // --- 深度智能分析文案 ---
            let insight = `【${activeCats[0]}】实时洞察报告：当前监测点分值为 ${cur.toFixed(2)}，较周期初始水平${diff > 0 ? '增长':'回撤'}${Math.abs(diff)}%。`;
            insight += `24H内该节点波动率维持在 ${((max-avg)/avg*100).toFixed(1)}%，处于商贸活跃期。`;
            
            if(cur > avg) {
                insight += ` 建议操作：**目前该品类流量动能充足，是布局“独立站+SEO关键词矩阵”的黄金窗口期。** 利用高权重搜索趋势，通过内容Hub架构快速锁住潜在私域用户，建立长期品牌护城河。`;
            } else {
                insight += ` 建议操作：**市场进入存量竞争阶段，建议执行“精细化SEO”策略。** 针对核心长尾词进行深度内容覆盖，通过云茗荟私域节点进行精准流量承接，以低成本换取高转化询盘。`;
            }
            
            document.getElementById('ai-text').innerText = insight;
        }

        chart.setOption({
            tooltip: { 
                trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', 
                textStyle: { color: '#fff', fontSize: 12 },
                formatter: (p) => `<b>${p[0].name}</b><br/>${p.map(x=>`${x.seriesName}: ${x.value.toFixed(2)}`).join('<br/>')}`
            },
            legend: { top: 0, textStyle: { color: '#8b949e' } },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'category', data: timeLabels, axisLine: { lineStyle: { color: '#30363d' } } },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
            series: series
        }, true);
    }

    function toggleCat(name, dom) {
        if(activeCats.includes(name)) {
            if(activeCats.length > 1) {
                activeCats = activeCats.filter(c => c !== name);
                dom.classList.remove('active');
            }
        } else {
            activeCats.push(name);
            dom.classList.add('active');
        }
        sync();
    }

    function capture() {
        const b = document.querySelector('.btn-gold'); b.innerText = "正在生成报表...";
        html2canvas(document.querySelector("#master-wrap"), { backgroundColor: "#0b0f19", scale: 2 }).then(c => {
            const l = document.createElement('a'); l.download = `YMTEA_Report_${Date.now()}.png`;
            l.href = c.toDataURL(); l.click(); b.innerText = "生成快报";
        });
    }

    function handleExport() { alert("正在加密并打包 CSV 历史监测数据..."); }

    sync();
    setInterval(sync, 15 * 60 * 1000);
    window.onresize = () => chart.resize();
</script>
</body>
</html>
