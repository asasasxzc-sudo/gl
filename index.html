<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 全球商贸脉动决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; --vip-gold: #f1e05a; --alert-red: #ff3d00; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Inter', 'PingFang SC', sans-serif; overflow-x: hidden; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        
        /* 顶部导航 */
        .header { padding: 12px 25px; background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: var(--accent-color); cursor: pointer; text-shadow: 0 0 10px rgba(0,200,83,0.3); }
        
        /* 核心统计区 */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 20px 25px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: 0.3s; position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-color); }
        .stat-val { font-size: 1.2rem; font-weight: bold; margin-top: 8px; font-family: 'Courier New', monospace; }

        /* 筛选面板 */
        .filter-section { padding: 0 25px 20px; display: flex; flex-direction: column; gap: 18px; }
        .group-box { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(48,54,61,0.3); }
        .filter-label { font-size: 0.7rem; color: var(--text-gray); margin-bottom: 10px; display: block; text-transform: uppercase; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

        /* 按钮动效 */
        .cat-btn, .time-btn { 
            background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); 
            padding: 7px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem;
        }
        .cat-btn:hover { border-color: var(--accent-color); color: #fff; }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0,200,83,0.2); }
        
        /* 预警动画 */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,61,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,61,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,61,0,0); } }
        .alert-active { border-color: var(--alert-red) !important; animation: pulse-red 2s infinite; }

        /* VIP 专属导出 */
        .export-btn { 
            background: #21262d; border: 1px solid var(--vip-gold); color: var(--vip-gold); 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s;
        }
        .export-btn.locked { opacity: 0.4; filter: grayscale(1); }
        .export-btn.unlocked { background: linear-gradient(45deg, rgba(241,224,90,0.1), rgba(241,224,90,0.2)); box-shadow: 0 0 20px rgba(241,224,90,0.1); }

        /* 内容区 */
        .content { flex: 1; padding: 0 25px; display: flex; flex-direction: column; min-height: 450px; }
        #chart-container { width: 100%; flex: 1; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: inset 0 0 40px rgba(0,0,0,0.2); }

        /* 底部 */
        .footer { padding: 30px; text-align: center; border-top: 1px solid var(--border-color); background: #0d1117; margin-top: 30px; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 12px; }
        .footer-links a { color: var(--text-gray); text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .footer-links a:hover { color: var(--accent-color); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA RADAR PRO</div>
        <button class="export-btn locked" id="vip-export-btn" onclick="handleExportClick()">📥 导出分析报告 (VIP)</button>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <span class="filter-label">实时脉动</span>
            <div id="stat-top-cat" class="stat-val" style="color:var(--accent-color)">- -</div>
        </div>
        <div class="stat-card">
            <span class="filter-label">决策权重</span>
            <div id="stat-avg-score" class="stat-val">0.00</div>
        </div>
        <div class="stat-card" style="border-left:none">
            <span class="filter-label">账户特权</span>
            <div id="vip-status-label" class="stat-val" style="color:var(--text-gray)">GUEST</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="group-box">
            <span class="filter-label">核心工业 & 科技高地</span>
            <div class="filter-group">
                <button class="cat-btn active" onclick="toggleCategory('AI流量', this)">AI流量</button>
                <button class="cat-btn" onclick="toggleCategory('新能源', this)">新能源</button>
                <button class="cat-btn" onclick="toggleCategory('汽车配件', this)">汽车配件</button>
                <button class="cat-btn" onclick="toggleCategory('半导体', this)">半导体</button>
                <button class="cat-btn" onclick="toggleCategory('金融科技', this)">金融科技</button>
            </div>
        </div>
        
        <div class="group-box">
            <span class="filter-label">生活消费 & 装修基建</span>
            <div class="filter-group">
                <button class="cat-btn" onclick="toggleCategory('茶+咖啡', this)">茶+咖啡</button>
                <button class="cat-btn" onclick="toggleCategory('服装鞋帽', this)">服装鞋帽</button>
                <button class="cat-btn" onclick="toggleCategory('餐饮娱乐', this)">餐饮娱乐</button>
                <button class="cat-btn" onclick="toggleCategory('装饰装修', this)">装饰装修</button>
                <button class="cat-btn" onclick="toggleCategory('建材', this)">建材</button>
                <button class="cat-btn" onclick="toggleCategory('百货零售', this)">百货零售</button>
            </div>
        </div>

        <div class="filter-group" style="justify-content: space-between;">
            <div style="display:flex; gap:8px">
                <button class="time-btn active">REALTIME</button>
                <button class="time-btn" id="vip-time-btn">HISTORY (7D)</button>
            </div>
            <div id="alert-hint" style="font-size:0.7rem; color:var(--alert-red); display:none; align-self:center">⚠️ 检测到异常脉动</div>
        </div>
    </div>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club">官网</a>
            <a href="https://www.ymtea.club/bbs/">论坛</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637">咨询</a>
        </div>
        <div style="color: #484f58; font-size: 0.75rem;">Powered by Cloudflare Global Edge | © 2026 YMTEA LABS</div>
    </footer>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let selectedCats = ['AI流量'];
        let allDataStore = {};
        let isVipGlobal = false;
        let clickCount = 0;

        document.getElementById('admin-logo').onclick = function() {
            clickCount++;
            if (clickCount >= 5) {
                const pwd = prompt("Access Key:");
                if (pwd === "ymtea888") {
                    handleVipToggle(pwd, confirm("激活全局 VIP 权限？") ? 1 : 0);
                }
                clickCount = 0;
            }
        };

        async function handleVipToggle(pwd, target) {
            await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                method: 'POST',
                headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            });
            location.reload(); 
        }

        async function toggleCategory(cat, btn) {
            if (selectedCats.includes(cat)) {
                if (selectedCats.length > 1) {
                    selectedCats = selectedCats.filter(c => c !== cat);
                    btn.classList.remove('active');
                }
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            refreshData();
        }

        async function refreshData() {
            myChart.showLoading({ text: '脉动同步中...', maskColor: 'rgba(11, 15, 25, 0.8)', textColor: '#00c853' });
            try {
                const promises = selectedCats.map(cat => 
                    fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(cat)}`).then(r => r.json())
                );
                const results = await Promise.all(promises);
                
                isVipGlobal = results.some(r => r.vipUnlocked === true);
                let series = [];
                let xAxisData = [];
                let hasAlert = false;

                results.forEach((res, index) => {
                    const data = res.data || res;
                    const catName = selectedCats[index];
                    allDataStore[catName] = data;

                    // 预警检测：如果最新值比前一个值变动超过 15%
                    if (data.length >= 2) {
                        const last = data[data.length-1].score;
                        const prev = data[data.length-2].score;
                        if (Math.abs(last - prev) / prev > 0.15) hasAlert = true;
                    }

                    if (index === 0) {
                        xAxisData = data.map(i => {
                            const t = i.timestamp.includes(' ') ? i.timestamp.split(' ')[1] : i.timestamp.split('T')[1];
                            return t ? t.slice(0, 5) : '--:--';
                        });
                        document.getElementById('stat-avg-score').innerText = data.length > 0 ? data[data.length-1].score.toFixed(2) : "0.00";
                    }

                    // 基础曲线
                    series.push({
                        name: catName, type: 'line', smooth: true, symbolSize: 8,
                        lineStyle: { width: 3 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(0, 200, 83, 0.3)' },
                                { offset: 1, color: 'rgba(0, 200, 83, 0)' }
                            ])
                        },
                        data: data.map(i => i.score)
                    });

                    // VIP 预测曲线 (虚线)
                    if (isVipGlobal && data.length > 3) {
                        const lastVal = data[data.length-1].score;
                        const trend = (lastVal - data[data.length-3].score) / 2;
                        series.push({
                            name: catName + ' (AI预测)', type: 'line', smooth: true, 
                            lineStyle: { type: 'dashed', width: 1, opacity: 0.5 },
                            data: [...Array(data.length-1).fill(null), lastVal, lastVal + trend]
                        });
                    }
                });

                document.getElementById('stat-top-cat').innerText = selectedCats[0] + (selectedCats.length > 1 ? ` +${selectedCats.length-1}` : '');
                document.getElementById('alert-hint').style.display = hasAlert ? 'block' : 'none';
                updateVipUI();
                renderChart(xAxisData, series);
            } catch (e) {
                myChart.showLoading({ text: '边缘节点连接失败', textColor: '#ff4444' });
            }
        }

        function updateVipUI() {
            const expBtn = document.getElementById('vip-export-btn');
            const timeBtn = document.getElementById('vip-time-btn');
            const label = document.getElementById('vip-status-label');

            if (isVipGlobal) {
                expBtn.classList.replace('locked', 'unlocked');
                expBtn.innerText = "📥 下载完整决策报告";
                timeBtn.style.opacity = "1";
                label.innerText = "VIP PRO";
                label.style.color = "var(--vip-gold)";
            } else {
                expBtn.classList.replace('unlocked', 'locked');
                expBtn.innerText = "📥 导出报表 (VIP)";
                timeBtn.style.opacity = "0.3";
                label.innerText = "GUEST";
            }
        }

        function handleExportClick() {
            if (!isVipGlobal) return alert("请开通 VIP 权限以导出商业智能报表。");
            let csv = "\ufeff行业,时间,分值\n";
            selectedCats.forEach(cat => {
                if (allDataStore[cat]) allDataStore[cat].forEach(r => csv += `${cat},${r.timestamp},${r.score}\n`);
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `YMTEA_RADAR_PRO.csv`;
            link.click();
        }

        function renderChart(xAxisData, series) {
            myChart.hideLoading();
            myChart.setOption({
                legend: { show: true, top: 10, textStyle: { color: '#8b949e' } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross', label: { backgroundColor: '#161b22' } } },
                grid: { top: '15%', left: '3%', right: '3%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: xAxisData, boundaryGap: false, axisLine: { lineStyle: { color: '#30363d' } } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
                series: series
            }, true);
        }

        refreshData();
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
