<script>
    const chartDom = document.getElementById('chart-container');
    const myChart = echarts.init(chartDom, 'dark');
    let currentCat = 'AI流量';
    let clickCount = 0; // 用于记录 Logo 点击次数

    // --- 隐藏管理功能：点击 Logo 5 次触发 ---
    document.querySelector('.logo').onclick = function() {
        clickCount++;
        if (clickCount === 5) {
            const password = prompt("请输入管理员暗号：");
            if (password) {
                const target = confirm("点击[确定]解锁全站VIP，点击[取消]恢复锁定") ? 1 : 0;
                toggleVip(password, target);
            }
            clickCount = 0;
        }
    };

    async function toggleVip(pwd, targetStatus) {
        try {
            const res = await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                method: 'POST',
                headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: targetStatus })
            });
            const result = await res.json();
            if (result.success) {
                alert(result.isUnlocked ? "✅ VIP 功能已全球同步解锁！" : "🔒 VIP 功能已恢复锁定");
                fetchData(currentCat); // 刷新当前状态
            } else {
                alert("❌ 暗号错误，权限拒绝");
            }
        } catch (e) { alert("通讯失败"); }
    }

    async function fetchData(category) {
        try {
            myChart.showLoading({ text: '同步数据...', maskColor: 'rgba(11, 15, 25, 0.7)' });
            const res = await fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(category)}`);
            const result = await res.json();
            
            // 处理 VIP 锁定逻辑
            const isUnlocked = result.vipUnlocked;
            const vipBtns = document.querySelectorAll('.time-btn:not(:first-child)');
            
            vipBtns.forEach(btn => {
                if (isUnlocked) {
                    btn.style.opacity = "1";
                    btn.onclick = () => {
                        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        alert('已切换至历史深度数据模式');
                    };
                } else {
                    btn.style.opacity = "0.4";
                    btn.onclick = () => alert('💡 这是云茗荟 VIP 专属功能\n请联系私域咨询开通解锁。');
                }
            });

            renderChart(result.data, category);
            document.getElementById('stat-avg-score').innerText = result.data.length > 0 ? result.data[result.data.length-1].score : 0;
            document.getElementById('stat-top-cat').innerText = category;
        } catch (err) {
            myChart.showLoading({ text: '连接失败', textColor: '#ff4444' });
        }
    }

    // ... 保持 renderChart 和 switchCategory 函数不变 ...
    function renderChart(data, category) {
        myChart.hideLoading();
        myChart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis' },
            grid: { top: '10%', left: '5%', right: '5%', bottom: '15%', containLabel: true },
            xAxis: {
                type: 'category',
                data: data.map(i => i.timestamp ? i.timestamp.split('T')[1].slice(0, 5) : '--:--'),
                axisLine: { lineStyle: { color: '#30363d' } }
            },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
            series: [{
                name: category,
                type: 'line',
                smooth: true,
                data: data.map(i => i.score),
                lineStyle: { width: 4, color: '#00c853' },
                areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(0, 200, 83, 0.4)' }, { offset: 1, color: 'rgba(0, 200, 83, 0)' }]) }
            }]
        }, true);
    }

    function switchCategory(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        fetchData(cat);
    }

    fetchData(currentCat);
    window.addEventListener('resize', () => myChart.resize());
</script>
