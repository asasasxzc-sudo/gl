<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar Ultimate | 商业决策智能终端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; --vip-gold: #f1e05a; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Inter', 'PingFang SC', sans-serif; }
        
        /* 布局控制 */
        .app-container { display: flex; flex-direction: column; min-height: 100vh; max-width: 1200px; margin: 0 auto; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent-color); cursor: pointer; letter-spacing: 2px; }

        /* 骨架屏 */
        .skeleton { background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 统计区 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); position: relative; }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 4px; background: var(--accent-color); border-radius: 0 4px 4px 0; }
        
        /* 筛选区 */
        .filter-panel { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        .filter-group-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
        .filter-title { font-size: 0.75rem; color: var(--accent-color); font-weight: bold; margin-bottom: 12px; display: block; }
        .btn-grid { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn { 
            background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); 
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        .btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); box-shadow: 0 4px 12px rgba(0,200,83,0.3); }
        .btn-vip { border-color: var(--vip-gold); color: var(--vip-gold); }

        /* 主体内容 */
        .main-content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }
        #chart-main { width: 100%; height: 450px; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); }
        
        /* 专家建议区 */
        .expert-card { background: linear-gradient(145deg, #1c2128, #161b22); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .expert-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .expert-badge { background: rgba(0, 200, 83, 0.1); color: var(--accent-color); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .share-btn { background: var(--vip-gold); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }

        .footer { padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-color); margin-top: 40px; color: var(--text-gray); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-container" id="capture-area">
    <header class="header">
        <div class="logo" id="admin-trigger">YMTEA RADAR ULTIMATE</div>
        <div style="display:flex; gap:10px">
            <button class="btn btn-vip" onclick="exportData()">CSV 导出</button>
            <button class="share-btn" onclick="generatePoster()">生成快报</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div style="font-size:0.7rem; color:var(--text-gray)">核心观测点</div>
            <div id="stat-name" style="font-size:1.1rem; font-weight:bold; margin-top:5px">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size:0.7rem; color:var(--text-gray)">实时指数</div>
            <div id="stat-val" style="font-size:1.1rem; font-weight:bold; margin-top:5px; color:var(--accent-color)">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size:0.7rem; color:var(--text-gray)">决策权限</div>
            <div id="stat-vip" style="font-size:1.1rem; font-weight:bold; margin-top:5px; color:var(--vip-gold)">STANDARD</div>
        </div>
    </div>

    <div class="filter-panel">
        <div class="filter-group-box">
            <span class="filter-title">科技 · 工业 · 能源</span>
            <div class="btn-grid">
                <button class="btn active" onclick="sel('AI流量', this)">AI流量</button>
                <button class="btn" onclick="sel('新能源', this)">新能源</button>
                <button class="btn" onclick="sel('汽车配件', this)">汽车配件</button>
                <button class="btn" onclick="sel('半导体', this)">半导体</button>
                <button class="btn" onclick="sel('金融科技', this)">金融科技</button>
            </div>
        </div>

        <div class="filter-group-box">
            <span class="filter-title">消费 · 零售 · 跨境</span>
            <div class="btn-grid">
                <button class="btn" onclick="sel('茶+咖啡', this)">茶+咖啡</button>
                <button class="btn" onclick="sel('服装鞋帽', this)">服装鞋帽</button>
                <button class="btn" onclick="sel('百货零售', this)">百货零售</button>
                <button class="btn" onclick="sel('餐饮娱乐', this)">餐饮娱乐</button>
                <button class="btn" onclick="sel('母婴用品', this)">母婴用品</button>
                <button class="btn" onclick="sel('跨境电商', this)">跨境电商</button>
            </div>
        </div>

        <div class="filter-group-box">
            <span class="filter-title">装修 · 基建 · 电子</span>
            <div class="btn-grid">
                <button class="btn" onclick="sel('装饰装修', this)">装饰装修</button>
                <button class="btn" onclick="sel('建材', this)">建材</button>
                <button class="btn" onclick="sel('消费电子', this)">消费电子</button>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center">
            <div class="btn-grid">
                <button class="btn active">24H 实时</button>
                <button class="btn btn-vip" onclick="checkVip('7D历史趋势')">7D 趋势 (VIP)</button>
            </div>
            <div id="sync-time" style="font-size:0.7rem; color:var(--text-gray)">上次同步: 刚才</div>
        </div>
    </div>

    <div class="main-content">
        <div id="chart-main"></div>
        
        <div class="expert-card">
            <div class="expert-header">
                <span class="expert-badge">YMTEA 商业大脑 AI 分析</span>
                <span style="font-size:0.7rem; color:var(--text-gray)">NO. 2026-0414</span>
            </div>
            <div id="expert-text" style="font-size:0.9rem; line-height:1.6; color:#e6edf3">
                正在深度检索边缘节点数据，通过多维向量模型评估行业健康度...
            </div>
        </div>
    </div>

    <footer class="footer">
        <div style="margin-bottom:15px; display:flex; justify-content:center; gap:20px">
            <a href="#" style="color:var(--text-gray); text-decoration:none">官网</a>
            <a href="#" style="color:var(--text-gray); text-decoration:none">研报库</a>
            <a href="#" style="color:var(--text-gray); text-decoration:none">联系专家</a>
        </div>
        <div>© 2026 YMTEA LABS | 全球商道脉动实时决策终端</div>
        <div style="font-size:0.6rem; margin-top:10px; opacity:0.5">本数据仅供决策辅助，不作为直接投资建议。</div>
    </footer>
</div>

<script>
    const chart = echarts.init(document.getElementById('chart-main'), 'dark');
    let cats = ['AI流量'];
    let isVip = false;
    let localData = JSON.parse(localStorage.getItem('ymtea_cache') || '{}');

    // 管理员入口
    let hits = 0;
    document.getElementById('admin-trigger').onclick = () => {
        if(++hits >= 5) {
            const key = prompt("请输入商业授权码:");
            if(key === 'ymtea888') {
                isVip = true;
                localStorage.setItem('ymtea_vip', 'true');
                location.reload();
            }
            hits = 0;
        }
    };

    if(localStorage.getItem('ymtea_vip') === 'true') isVip = true;

    function sel(name, btn) {
        if(cats.includes(name)) {
            if(cats.length > 1) {
                cats = cats.filter(c => c !== name);
                btn.classList.remove('active');
            }
        } else {
            cats.push(name);
            btn.classList.add('active');
        }
        update();
    }

    async function update() {
        chart.showLoading({ text: '', color: '#00c853', maskColor: 'rgba(0,0,0,0.5)' });
        try {
            const reqs = cats.map(c => fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(c)}`).then(r => r.json()));
            const res = await Promise.all(reqs);
            
            // 离线存储
            res.forEach((r, i) => { localData[cats[i]] = r; });
            localStorage.setItem('ymtea_cache', JSON.stringify(localData));

            render(res);
        } catch(e) {
            console.warn("网络异常，加载缓存数据");
            const cached = cats.map(c => localData[c]).filter(Boolean);
            if(cached.length > 0) render(cached);
        }
    }

    function render(results) {
        chart.hideLoading();
        let series = [];
        let times = [];
        
        results.forEach((r, idx) => {
            const d = r.data || r;
            if(idx === 0) times = d.map(v => v.timestamp.split('T')[1].slice(0,5));
            
            series.push({
                name: cats[idx],
                type: 'line',
                smooth: true,
                symbol: 'none',
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0,0,0,1, [
                        {offset:0, color: 'rgba(0,200,83,0.2)'},
                        {offset:1, color: 'rgba(0,200,83,0)'}
                    ])
                },
                data: d.map(v => v.score)
            });
        });

        // 专家分析逻辑
        const mainCat = cats[0];
        const mainData = (results[0].data || results[0]);
        const last = mainData[mainData.length-1].score;
        const prev = mainData[mainData.length-2].score;
        const trend = (((last - prev)/prev)*100).toFixed(2);

        document.getElementById('stat-name').innerText = cats.join(' + ');
        document.getElementById('stat-val').innerText = last.toFixed(2);
        document.getElementById('stat-vip').innerText = isVip ? "VIP PRO" : "STANDARD";
        document.getElementById('sync-time').innerText = `上次同步: ${new Date().toLocaleTimeString()}`;

        let advice = trend > 0 ? "板块脉动上行，资本活跃度增强，建议加持关注。" : "当前处于震荡回调期，建议观望库存水位。";
        document.getElementById('expert-text').innerText = `【${mainCat}】实时监测：当前分值${last.toFixed(2)}，较上一周期${trend > 0 ? '增长':'回撤'}${Math.abs(trend)}%。YMTEA 商业大脑提示：${advice}`;

        chart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { top: 10 },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
            dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', height: 20, bottom: 5 }],
            xAxis: { type: 'category', data: times, boundaryGap: false },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#30363d' } } },
            series: series
        }, true);
    }

    function checkVip(msg) {
        if(!isVip) alert(`🔒 ${msg} 属于 VIP PRO 专属功能，请咨询获取商业授权。`);
        else alert(`正在开启 ${msg}...`);
    }

    function generatePoster() {
        const btn = document.querySelector('.share-btn');
        btn.innerText = "生成中...";
        html2canvas(document.querySelector("#capture-area"), {
            backgroundColor: "#0b0f19",
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `YMTEA_Report_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btn.innerText = "生成快报";
        });
    }

    function exportData() {
        if(!isVip) return checkVip('数据导出');
        alert("正在导出 24H 商业全维度报表...");
    }

    update();
    window.onresize = () => chart.resize();
</script>
</body>
</html>
