<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 2026 全球全品类趋势看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; }
        body { 
            background: var(--bg-dark); color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; margin: 0; 
        }
        /* 导航栏 */
        .header { 
            padding: 15px 25px; background: var(--card-bg); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #30363d;
        }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--accent-color); letter-spacing: 1px; }
        
        /* 分类筛选器 */
        .filter-bar {
            padding: 15px 25px; display: flex; gap: 10px; flex-wrap: wrap;
            background: rgba(22, 27, 34, 0.5);
        }
        .cat-btn {
            background: #21262d; border: 1px solid #30363d; color: #8b949e;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .cat-btn:hover { border-color: var(--accent-color); color: #fff; }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0,200,83,0.3); }

        /* 图表容器 */
        #chart-container { width: 100%; height: calc(100vh - 140px); min-height: 400px; }
        
        .loading-mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #8b949e; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">YMTEA CLOUD RADAR</div>
        <div style="font-size: 0.8rem; color: #8b949e;">数据来源：Cloudflare Radar API (Real-time)</div>
    </header>

    <nav class="filter-bar" id="category-filters">
        <button class="cat-btn active" onclick="switchCategory('消费电子', this)">消费电子</button>
        <button class="cat-btn" onclick="switchCategory('家居生活', this)">家居生活</button>
        <button class="cat-btn" onclick="switchCategory('跨境电商', this)">跨境电商</button>
        <button class="cat-btn" onclick="switchCategory('金融科技', this)">金融科技</button>
        <button class="cat-btn" onclick="switchCategory('AI流量', this)">AI流量</button>
    </nav>

    <div id="chart-container"></div>

    <script>
        const chartDom = document.getElementById('chart-container');
        const myChart = echarts.init(chartDom, 'dark');
        let currentCat = '消费电子';

        // 核心获取数据逻辑
        async function fetchData(category) {
            try {
                myChart.showLoading({ text: '同步 Cloudflare 边缘数据...', maskColor: 'rgba(11, 15, 25, 0.7)' });
                
                // 请求时带上 category 参数，Worker 需根据此参数执行 D1 查询
                const res = await fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(category)}`, {
                    headers: { 'Authorization': 'Bearer test_token_888' }
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                if (!data || data.length === 0) {
                    showEmpty();
                    return;
                }

                renderChart(data, category);
            } catch (err) {
                console.error(err);
                myChart.showLoading({ text: '无法联通 Cloudflare 节点: ' + err.message, textColor: '#ff4444' });
            }
        }

        // 渲染图表
        function renderChart(data, category) {
            myChart.hideLoading();
            const option = {
                backgroundColor: 'transparent',
                tooltip: { 
                    trigger: 'axis', 
                    formatter: '{b}<br/><span style="color:#00c853">●</span> {a}: {c}%' 
                },
                grid: { top: '10%', left: '5%', right: '5%', bottom: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: data.map(i => i.timestamp ? i.timestamp.split('T')[1].slice(0, 5) : '--:--'),
                    axisLine: { lineStyle: { color: '#30363d' } }
                },
                yAxis: {
                    type: 'value',
                    name: '增长指数 (%)',
                    splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } }
                },
                series: [{
                    name: category,
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    data: data.map(i => i.score),
                    lineStyle: { width: 4, color: '#00c853' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0, 200, 83, 0.3)' },
                            { offset: 1, color: 'rgba(0, 200, 83, 0)' }
                        ])
                    },
                    emphasis: { lineStyle: { width: 5 } }
                }]
            };
            myChart.setOption(option, true); // true 表示不合并旧配置，完全刷新
        }

        // 切换分类逻辑
        function switchCategory(cat, btn) {
            currentCat = cat;
            // 更新按钮样式
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // 获取新数据
            fetchData(cat);
        }

        function showEmpty() {
            myChart.showLoading({ text: '当前分类暂无 Radar 缓存数据', textColor: '#8b949e', maskColor: 'rgba(11, 15, 25, 0.8)' });
        }

        // 初始化
        fetchData(currentCat);
        window.addEventListener('resize', () => myChart.resize());
        setInterval(() => fetchData(currentCat), 60000 * 5); // 每 5 分钟同步一次
    </script>
</body>
</html>
