<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 云茗荟商贸决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; --vip-gold: #f1e05a; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'PingFang SC', sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { padding: 12px 25px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.1rem; font-weight: 800; color: var(--accent-color); cursor: pointer; }
        
        .stats-container { display: flex; gap: 10px; padding: 15px 25px 5px; flex-wrap: wrap; }
        .stat-card { background: var(--card-bg); padding: 12px; border-radius: 8px; flex: 1; min-width: 130px; border: 1px solid var(--border-color); border-left: 3px solid var(--accent-color); }

        .filter-section { padding: 10px 25px; display: flex; flex-direction: column; gap: 12px; }
        .filter-label { font-size: 0.75rem; color: var(--text-gray); margin-bottom: 5px; display: block; }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .cat-btn, .time-btn, .export-btn { 
            background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); 
            padding: 6px 14px; border-radius: 18px; cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        /* VIP 专属导出按钮样式 */
        .export-btn { border-color: var(--vip-gold); color: var(--vip-gold); opacity: 0.6; }
        .export-btn.unlocked { opacity: 1; background: rgba(241, 224, 90, 0.1); }

        .content { flex: 1; padding: 10px 25px; display: flex; flex-direction: column; min-height: 400px; }
        #chart-container { width: 100%; flex: 1; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); }

        .footer { background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 20px 25px; text-align: center; margin-top: auto; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-gray); text-decoration: none; font-size: 0.8rem; }
        .copyright { color: #484f58; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA RADAR PRO</div>
        <button class="export-btn" id="main-export-btn" onclick="handleExportClick()">📥 数据导出 (VIP)</button>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 0.65rem; color: var(--text-gray);">当前分析</div>
            <div id="stat-top-cat" style="font-size: 0.9rem; font-weight: bold; margin-top:4px;">AI流量</div>
        </div>
        <div class="stat-card" style="border-left-color: #2196f3;">
            <div style="font-size: 0.65rem; color: var(--text-gray);">脉动均值</div>
            <div id="stat-avg-score" style="font-size: 1rem; font-weight: bold; margin-top:4px;">0</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--vip-gold);">
            <div style="font-size: 0.65rem; color: var(--text-gray);">VIP 状态</div>
            <div id="vip-status-text" style="font-size: 0.9rem; font-weight: bold; margin-top:4px; color: var(--text-gray);">未解锁</div>
        </div>
    </div>

    <div class="filter-section">
        <div>
            <span class="filter-label">行业大类：</span>
            <div class="filter-group">
                <button class="cat-btn active" onclick="toggleCategory('AI流量', this)">AI流量</button>
                <button class="cat-btn" onclick="toggleCategory('消费电子', this)">消费电子</button>
                <button class="cat-btn" onclick="toggleCategory('跨境电商', this)">跨境电商</button>
                <button class="cat-btn" onclick="toggleCategory('百货零售', this)">百货零售</button>
                <button class="cat-btn" onclick="toggleCategory('生活服饰', this)">生活服饰</button>
                <button class="cat-btn" onclick="toggleCategory('金融科技', this)">金融科技</button>
            </div>
        </div>
        <div>
            <span class="filter-label">深度细分：</span>
            <div class="filter-group">
                <button class="cat-btn" onclick="toggleCategory('半导体设备', this)">半导体设备</button>
                <button class="cat-btn" onclick="toggleCategory('储能技术', this)">储能技术</button>
                <button class="cat-btn" onclick="toggleCategory('智能制造', this)">智能制造</button>
                <button class="cat-btn" onclick="toggleCategory('母婴用品', this)">母婴用品</button>
                <button class="cat-btn" onclick="toggleCategory('SaaS工具', this)">SaaS工具</button>
                <button class="cat-btn" onclick="toggleCategory('美妆个护', this)">美妆个护</button>
            </div>
        </div>
        <div class="filter-group">
            <button class="time-btn active">实时 (24H)</button>
            <button class="time-btn" id="vip-time-btn">趋势 (7D VIP)</button>
        </div>
    </div>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club" target="_blank">官网</a>
            <a href="https://www.ymtea.club/bbs/" target="_blank">论坛</a>
            <a href="https://vip.ymtea.club" target="_blank">会员</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637" target="_blank">咨询</a>
        </div>
        <div class="copyright">© 2026 YMTEA LABS | 边缘计算实时同步</div>
    </footer>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let selectedCats = ['AI流量'];
        let allDataStore = {};
        let isVipGlobal = false;
        let clickCount = 0;

        document.getElementById('admin-logo').onclick = function() {
            clickCount++;
            if (clickCount >= 5) {
                const pwd = prompt("管理员验证:");
                if (pwd === "ymtea888") {
                    const target = confirm("切换全站VIP状态？") ? 1 : 0;
                    handleVipToggle(pwd, target);
                }
                clickCount = 0;
            }
        };

        async function handleVipToggle(pwd, target) {
            await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                method: 'POST',
                headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            });
            location.reload(); 
        }

        async function toggleCategory(cat, btn) {
            if (selectedCats.includes(cat)) {
                if (selectedCats.length > 1) {
                    selectedCats = selectedCats.filter(c => c !== cat);
                    btn.classList.remove('active');
                }
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            refreshData();
        }

        async function refreshData() {
            myChart.showLoading({ text: '同步中...', maskColor: 'rgba(11, 15, 25, 0.8)' });
            try {
                const promises = selectedCats.map(cat => 
                    fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(cat)}`).then(r => r.json())
                );
                const results = await Promise.all(promises);
                
                let series = [];
                let xAxisData = [];
                isVipGlobal = results.some(r => r.vipUnlocked === true);

                results.forEach((res, index) => {
                    const data = res.data || res;
                    const catName = selectedCats[index];
                    allDataStore[catName] = data;

                    if (index === 0) {
                        xAxisData = data.map(i => {
                            const t = i.timestamp.includes(' ') ? i.timestamp.split(' ')[1] : i.timestamp.split('T')[1];
                            return t ? t.slice(0, 5) : '--:--';
                        });
                        document.getElementById('stat-avg-score').innerText = data.length > 0 ? data[data.length-1].score : 0;
                    }

                    series.push({
                        name: catName, type: 'line', smooth: true, symbolSize: 6,
                        data: data.map(i => i.score)
                    });
                });

                document.getElementById('stat-top-cat').innerText = selectedCats.join(' + ');
                updateVipUI();
                renderChart(xAxisData, series);
            } catch (e) {
                myChart.showLoading({ text: '数据异常', textColor: '#ff4444' });
            }
        }

        function updateVipUI() {
            const expBtn = document.getElementById('main-export-btn');
            const timeBtn = document.getElementById('vip-time-btn');
            const statusText = document.getElementById('vip-status-text');

            if (isVipGlobal) {
                expBtn.classList.add('unlocked');
                expBtn.innerText = "📥 导出 CSV 数据";
                timeBtn.style.opacity = "1";
                timeBtn.innerText = "趋势 (7D 已解锁)";
                statusText.innerText = "已激活";
                statusText.style.color = "var(--accent-color)";
            } else {
                expBtn.classList.remove('unlocked');
                expBtn.innerText = "📥 导出数据 (VIP)";
                timeBtn.style.opacity = "0.4";
                statusText.innerText = "未解锁";
                statusText.style.color = "var(--text-gray)";
            }
        }

        function handleExportClick() {
            if (!isVipGlobal) {
                alert("💡 该功能仅限 VIP 会员使用。\n请点击底部[咨询]联系管理员开通。");
                return;
            }
            exportToCSV();
        }

        function exportToCSV() {
            let csv = "\ufeff行业,监测时间,分值\n";
            selectedCats.forEach(cat => {
                if (allDataStore[cat]) {
                    allDataStore[cat].forEach(r => csv += `${cat},${r.timestamp},${r.score}\n`);
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `YMTEA_RADAR_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function renderChart(xAxisData, series) {
            myChart.hideLoading();
            myChart.setOption({
                legend: { show: true, bottom: 0, textStyle: { color: '#8b949e', fontSize: 10 } },
                tooltip: { trigger: 'axis' },
                grid: { top: '10%', left: '4%', right: '4%', bottom: '15%', containLabel: true },
                xAxis: { type: 'category', data: xAxisData, axisLine: { lineStyle: { color: '#30363d' } } },
                yAxis: { type: 'value', min: 'dataMin', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
                series: series
            }, true);
        }

        refreshData();
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
