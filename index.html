<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 全球商贸脉动决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: sans-serif; }
        body { display: flex; flex-direction: column; }
        .header { padding: 15px 25px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--accent-color); cursor: pointer; }
        .stats-container { display: flex; gap: 15px; padding: 20px 25px 10px; flex-wrap: wrap; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; flex: 1; min-width: 180px; border: 1px solid var(--border-color); border-left: 4px solid var(--accent-color); }
        .filter-section { padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .cat-btn, .time-btn, .export-btn { background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .export-btn { border-color: #f1e05a; color: #f1e05a; }
        .content { flex: 1; padding: 0 25px 20px; display: flex; flex-direction: column; }
        #chart-container { width: 100%; flex: 1; min-height: 450px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA CLOUD RADAR</div>
        <div class="filter-group">
            <button class="export-btn" onclick="exportToCSV()">📥 导出 CSV</button>
        </div>
    </header>

    <div class="stats-container">
        <div class="stat-card"><div style="font-size: 0.75rem; color: var(--text-gray);">对比品类</div><div id="stat-top-cat" style="font-size: 1.1rem; font-weight: bold;">--</div></div>
        <div class="stat-card" style="border-left-color: #2196f3;"><div style="font-size: 0.75rem; color: var(--text-gray);">平均指数</div><div id="stat-avg-score" style="font-size: 1.1rem; font-weight: bold;">0</div></div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <button class="cat-btn" onclick="toggleCategory('消费电子', this)">消费电子</button>
            <button class="cat-btn" onclick="toggleCategory('家居生活', this)">家居生活</button>
            <button class="cat-btn" onclick="toggleCategory('跨境电商', this)">跨境电商</button>
            <button class="cat-btn" onclick="toggleCategory('金融科技', this)">金融科技</button>
            <button class="cat-btn active" onclick="toggleCategory('AI流量', this)">AI流量</button>
        </div>
        <div class="filter-group">
            <button class="time-btn active">24H</button>
            <button class="time-btn" id="vip-btn">7D (VIP)</button>
        </div>
    </div>

    <div class="content"><div id="chart-container"></div></div>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let selectedCats = ['AI流量']; // 支持多选
        let allDataStore = {}; // 缓存各品类数据

        // 管理入口（保持不变）
        document.getElementById('admin-logo').onclick = function() {
            // ... (保持原有的 5 次点击逻辑)
        };

        async function toggleCategory(cat, btn) {
            if (selectedCats.includes(cat)) {
                if (selectedCats.length > 1) {
                    selectedCats = selectedCats.filter(c => c !== cat);
                    btn.classList.remove('active');
                }
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            refreshAllData();
        }

        async function refreshAllData() {
            myChart.showLoading();
            const promises = selectedCats.map(cat => 
                fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(cat)}`).then(r => r.json())
            );
            
            const results = await Promise.all(promises);
            let series = [];
            let xAxisData = [];

            results.forEach((res, index) => {
                const data = res.data || res;
                const catName = selectedCats[index];
                allDataStore[catName] = data; // 存入缓存供导出

                if (index === 0) { // 以第一个序列的时间作为 X 轴
                    xAxisData = data.map(i => {
                        const timePart = i.timestamp.includes(' ') ? i.timestamp.split(' ')[1] : i.timestamp.split('T')[1];
                        return timePart ? timePart.slice(0, 5) : '--:--';
                    });
                }

                series.push({
                    name: catName,
                    type: 'line',
                    smooth: true,
                    data: data.map(i => i.score)
                });
            });

            document.getElementById('stat-top-cat').innerText = selectedCats.join(' + ');
            renderChart(xAxisData, series);
        }

        function renderChart(xAxisData, series) {
            myChart.hideLoading();
            myChart.setOption({
                legend: { show: true, bottom: 0 },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: xAxisData },
                yAxis: { type: 'value', min: 'dataMin' },
                series: series
            }, true);
        }

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,品类,时间,指数\n";
            selectedCats.forEach(cat => {
                if (allDataStore[cat]) {
                    allDataStore[cat].forEach(row => {
                        csvContent += `${cat},${row.timestamp},${row.score}\n`;
                    });
                }
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `YMTEA_Export_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        refreshAllData();
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
