<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 全球商贸脉动决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'PingFang SC', sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        
        /* 顶部 */
        .header { padding: 12px 25px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.1rem; font-weight: 800; color: var(--accent-color); cursor: pointer; user-select: none; }
        
        /* 统计卡片 */
        .stats-container { display: flex; gap: 12px; padding: 15px 25px 5px; flex-wrap: wrap; }
        .stat-card { background: var(--card-bg); padding: 12px; border-radius: 8px; flex: 1; min-width: 140px; border: 1px solid var(--border-color); border-left: 3px solid var(--accent-color); }

        /* 筛选与操作区 */
        .filter-section { padding: 5px 25px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .cat-btn, .time-btn, .export-btn { 
            background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); 
            padding: 6px 14px; border-radius: 18px; cursor: pointer; transition: 0.3s; font-size: 0.8rem;
        }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .export-btn { border-color: #f1e05a; color: #f1e05a; }

        /* 内容区 */
        .content { flex: 1; padding: 0 25px; display: flex; flex-direction: column; min-height: 380px; }
        #chart-container { width: 100%; flex: 1; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); }

        /* 底部导航 - 物理强制触底 */
        .footer { background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 20px 25px; text-align: center; margin-top: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-gray); text-decoration: none; font-size: 0.8rem; transition: 0.2s; }
        .footer-links a:hover { color: var(--accent-color); }
        .copyright { color: #484f58; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA RADAR V3</div>
        <button class="export-btn" onclick="exportToCSV()">📥 数据导出</button>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 0.65rem; color: var(--text-gray);">对比项目</div>
            <div id="stat-top-cat" style="font-size: 1rem; font-weight: bold; margin-top:4px;">AI流量</div>
        </div>
        <div class="stat-card" style="border-left-color: #2196f3;">
            <div style="font-size: 0.65rem; color: var(--text-gray);">指数均值</div>
            <div id="stat-avg-score" style="font-size: 1rem; font-weight: bold; margin-top:4px;">0</div>
        </div>
        <div class="stat-card" style="border-left-color: #ff9800;">
            <div style="font-size: 0.65rem; color: var(--text-gray);">节点状态</div>
            <div style="font-size: 1rem; font-weight: bold; margin-top:4px; color: var(--accent-color);">CLOUDFLARE</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-row">
            <div class="filter-group" id="cat-group">
                <button class="cat-btn active" onclick="toggleCategory('AI流量', this)">AI流量</button>
                <button class="cat-btn" onclick="toggleCategory('消费电子', this)">消费电子</button>
                <button class="cat-btn" onclick="toggleCategory('跨境电商', this)">跨境电商</button>
                <button class="cat-btn" onclick="toggleCategory('金融科技', this)">金融科技</button>
                <button class="cat-btn" onclick="toggleCategory('智能制造', this)">智能制造</button>
                <button class="cat-btn" onclick="toggleCategory('半导体', this)">半导体</button>
                <button class="cat-btn" onclick="toggleCategory('新能源', this)">新能源</button>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-group">
                <span style="font-size: 0.75rem; color: var(--text-gray); align-self: center;">时间跨度：</span>
                <button class="time-btn active">24H 实时</button>
                <button class="time-btn" id="vip-btn">7D 趋势 (VIP)</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club" target="_blank">官网首页</a>
            <a href="https://www.ymtea.club/bbs/" target="_blank">论坛社区</a>
            <a href="https://vip.ymtea.club" target="_blank">会员中心</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637" target="_blank">私域咨询</a>
        </div>
        <div class="copyright">© 2026 YMTEA LABS | 全球边缘计算实时脉动系统</div>
    </footer>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let selectedCats = ['AI流量'];
        let allDataStore = {};
        let clickCount = 0;

        // 管理暗号
        document.getElementById('admin-logo').onclick = function() {
            clickCount++;
            if (clickCount >= 5) {
                const pwd = prompt("管理员验证:");
                if (pwd === "ymtea888") {
                    const target = confirm("是否开启全站VIP模式？") ? 1 : 0;
                    handleVipToggle(pwd, target);
                }
                clickCount = 0;
            }
        };

        async function handleVipToggle(pwd, target) {
            await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                method: 'POST',
                headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            });
            location.reload(); 
        }

        async function toggleCategory(cat, btn) {
            if (selectedCats.includes(cat)) {
                if (selectedCats.length > 1) {
                    selectedCats = selectedCats.filter(c => c !== cat);
                    btn.classList.remove('active');
                }
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            refreshData();
        }

        async function refreshData() {
            myChart.showLoading({ text: '同步数据...', maskColor: 'rgba(11, 15, 25, 0.8)' });
            try {
                const promises = selectedCats.map(cat => 
                    fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(cat)}`).then(r => r.json())
                );
                const results = await Promise.all(promises);
                
                let series = [];
                let xAxisData = [];
                // 核心修复：确保能够正确捕捉 VIP 状态
                let isUnlocked = false;

                results.forEach((res, index) => {
                    const data = res.data || res;
                    if (res.vipUnlocked) isUnlocked = true; // 只要有一个请求返回已解锁，则全局显示解锁

                    const catName = selectedCats[index];
                    allDataStore[catName] = data;

                    if (index === 0) {
                        xAxisData = data.map(i => {
                            if(!i.timestamp) return '--:--';
                            const t = i.timestamp.includes(' ') ? i.timestamp.split(' ')[1] : i.timestamp.split('T')[1];
                            return t ? t.slice(0, 5) : '--:--';
                        });
                        document.getElementById('stat-avg-score').innerText = data.length > 0 ? data[data.length-1].score : 0;
                    }

                    series.push({
                        name: catName, type: 'line', smooth: true, symbolSize: 6,
                        data: data.map(i => i.score)
                    });
                });

                document.getElementById('stat-top-cat').innerText = selectedCats.join(' / ');
                
                // VIP 状态渲染
                const vBtn = document.getElementById('vip-btn');
                if (isUnlocked) {
                    vBtn.style.opacity = "1";
                    vBtn.style.color = "#00c853";
                    vBtn.innerText = "7D 趋势 (已解锁)";
                    vBtn.onclick = () => alert("已开启历史趋势追踪模式");
                } else {
                    vBtn.style.opacity = "0.4";
                    vBtn.innerText = "7D 趋势 (VIP)";
                    vBtn.onclick = () => alert("💡 这是云茗荟 VIP 专属功能\n请联系微信咨询解锁。");
                }

                renderChart(xAxisData, series);
            } catch (e) {
                myChart.showLoading({ text: '链路中断', textColor: '#ff4444' });
            }
        }

        function renderChart(xAxisData, series) {
            myChart.hideLoading();
            myChart.setOption({
                legend: { show: true, bottom: 0, textStyle: { color: '#8b949e', fontSize: 10 } },
                tooltip: { trigger: 'axis' },
                grid: { top: '10%', left: '4%', right: '4%', bottom: '15%', containLabel: true },
                xAxis: { type: 'category', data: xAxisData, axisLine: { lineStyle: { color: '#30363d' } } },
                yAxis: { type: 'value', min: 'dataMin', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
                series: series
            }, true);
        }

        function exportToCSV() {
            let csv = "\ufeff品类,时间,分值\n";
            selectedCats.forEach(cat => {
                if (allDataStore[cat]) {
                    allDataStore[cat].forEach(r => csv += `${cat},${r.timestamp},${r.score}\n`);
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `YMTEA_DATA_EXPORT.csv`;
            link.click();
        }

        refreshData();
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
