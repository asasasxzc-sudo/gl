<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 完整商贸决策看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; --border-color: #30363d; --vip-gold: #f1e05a; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'PingFang SC', sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { padding: 12px 20px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.1rem; font-weight: 800; color: var(--accent-color); cursor: pointer; user-select: none; }
        
        .stats-container { display: flex; gap: 10px; padding: 15px 20px; flex-wrap: wrap; }
        .stat-card { background: var(--card-bg); padding: 10px; border-radius: 8px; flex: 1; min-width: 120px; border: 1px solid var(--border-color); border-left: 3px solid var(--accent-color); }

        .filter-section { padding: 0 20px 15px; display: flex; flex-direction: column; gap: 12px; }
        .filter-group-wrap { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        .filter-label { font-size: 0.7rem; color: var(--accent-color); margin-bottom: 8px; display: block; font-weight: bold; }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .cat-btn, .time-btn { 
            background: #21262d; border: 1px solid var(--border-color); color: var(--text-gray); 
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: 0.2s;
        }
        .cat-btn.active, .time-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        .export-btn { background: transparent; border: 1px solid var(--vip-gold); color: var(--vip-gold); padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; cursor: pointer; opacity: 0.5; }
        .export-btn.unlocked { opacity: 1; background: rgba(241, 224, 90, 0.1); }

        .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }
        #chart-container { width: 100%; flex: 1; min-height: 350px; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); }

        .footer { background: var(--card-bg); padding: 15px; text-align: center; border-top: 1px solid var(--border-color); margin-top: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 5px; }
        .footer-links a { color: var(--text-gray); text-decoration: none; font-size: 0.75rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" id="admin-logo">YMTEA RADAR</div>
        <button class="export-btn" id="vip-export-btn" onclick="handleExportClick()">数据导出 (VIP)</button>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 0.6rem; color: var(--text-gray);">当前对比</div>
            <div id="stat-top-cat" style="font-size: 0.85rem; font-weight: bold; margin-top:3px;">AI流量</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--vip-gold);">
            <div style="font-size: 0.6rem; color: var(--text-gray);">权限级别</div>
            <div id="vip-status-label" style="font-size: 0.85rem; font-weight: bold; margin-top:3px;">STANDARD</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group-wrap">
            <span class="filter-label">科技与工业</span>
            <div class="filter-group">
                <button class="cat-btn active" onclick="toggleCategory('AI流量', this)">AI流量</button>
                <button class="cat-btn" onclick="toggleCategory('新能源', this)">新能源</button>
                <button class="cat-btn" onclick="toggleCategory('汽车配件', this)">汽车配件</button>
                <button class="cat-btn" onclick="toggleCategory('半导体', this)">半导体</button>
                <button class="cat-btn" onclick="toggleCategory('金融科技', this)">金融科技</button>
            </div>
        </div>
        
        <div class="filter-group-wrap">
            <span class="filter-label">生活消费与零售</span>
            <div class="filter-group">
                <button class="cat-btn" onclick="toggleCategory('服装鞋帽', this)">服装鞋帽</button>
                <button class="cat-btn" onclick="toggleCategory('茶+咖啡', this)">茶+咖啡</button>
                <button class="cat-btn" onclick="toggleCategory('餐饮娱乐', this)">餐饮娱乐</button>
                <button class="cat-btn" onclick="toggleCategory('百货零售', this)">百货零售</button>
                <button class="cat-btn" onclick="toggleCategory('母婴用品', this)">母婴用品</button>
                <button class="cat-btn" onclick="toggleCategory('跨境电商', this)">跨境电商</button>
            </div>
        </div>

        <div class="filter-group-wrap">
            <span class="filter-label">装饰装修与基建</span>
            <div class="filter-group">
                <button class="cat-btn" onclick="toggleCategory('装饰装修', this)">装饰装修</button>
                <button class="cat-btn" onclick="toggleCategory('建材', this)">建材</button>
                <button class="cat-btn" onclick="toggleCategory('消费电子', this)">消费电子</button>
            </div>
        </div>

        <div class="filter-group-wrap">
            <span class="filter-label">时间跨度</span>
            <div class="filter-group">
                <button class="time-btn active" id="time-24h">24H 实时</button>
                <button class="time-btn" id="time-7d" onclick="handle7DClick()">7D 趋势 (VIP)</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club">官网</a>
            <a href="https://www.ymtea.club/bbs/">论坛</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637">咨询</a>
        </div>
        <div style="color: #484f58; font-size: 0.65rem;">© 2026 YMTEA LABS | 商业智能数据系统</div>
    </footer>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        let selectedCats = ['AI流量'];
        let isVipGlobal = false;
        let clickCount = 0;

        document.getElementById('admin-logo').onclick = function() {
            clickCount++;
            if (clickCount >= 5) {
                const pwd = prompt("Access Key:");
                if (pwd === "ymtea888") {
                    handleVipToggle(pwd, confirm("激活 VIP 权限?") ? 1 : 0);
                }
                clickCount = 0;
            }
        };

        async function handleVipToggle(pwd, target) {
            await fetch(`https://gl.asasasxzc.workers.dev?action=manage_vip`, {
                method: 'POST',
                headers: { 'Admin-Token': pwd, 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            });
            location.reload(); 
        }

        async function toggleCategory(cat, btn) {
            if (selectedCats.includes(cat)) {
                if (selectedCats.length > 1) {
                    selectedCats = selectedCats.filter(c => c !== cat);
                    btn.classList.remove('active');
                }
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            refreshData();
        }

        async function refreshData() {
            myChart.showLoading({ text: '同步中...' });
            try {
                const promises = selectedCats.map(cat => 
                    fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(cat)}`).then(r => r.json())
                );
                const results = await Promise.all(promises);
                isVipGlobal = results.some(r => r.vipUnlocked === true);
                
                let series = [];
                let xAxisData = [];

                results.forEach((res, index) => {
                    const data = res.data || res;
                    const catName = selectedCats[index];
                    if (index === 0) {
                        xAxisData = data.map(i => i.timestamp.split('T')[1]?.slice(0, 5) || '--:--');
                    }
                    series.push({
                        name: catName, type: 'line', smooth: true,
                        areaStyle: { opacity: 0.1 },
                        data: data.map(i => i.score)
                    });
                });

                document.getElementById('stat-top-cat').innerText = selectedCats[0] + (selectedCats.length > 1 ? ' +' + (selectedCats.length-1) : '');
                updateVipUI();
                myChart.hideLoading();
                myChart.setOption({
                    tooltip: { trigger: 'axis' },
                    legend: { show: true, bottom: 0, textStyle: { fontSize: 10 } },
                    grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
                    xAxis: { type: 'category', data: xAxisData },
                    yAxis: { type: 'value' },
                    series: series
                }, true);
            } catch (e) {
                myChart.showLoading({ text: '连接异常' });
            }
        }

        function updateVipUI() {
            const btn = document.getElementById('vip-export-btn');
            const label = document.getElementById('vip-status-label');
            const time7d = document.getElementById('time-7d');
            
            if (isVipGlobal) {
                btn.classList.add('unlocked');
                time7d.style.opacity = "1";
                label.innerText = "VIP PRO";
                label.style.color = "var(--vip-gold)";
            } else {
                btn.classList.remove('unlocked');
                time7d.style.opacity = "0.4";
                label.innerText = "STANDARD";
                label.style.color = "var(--text-gray)";
            }
        }

        function handle7DClick() {
            if (!isVipGlobal) {
                alert("🔒 历史趋势查询仅限 VIP 用户。");
                return;
            }
            alert("正在切换至 7D 趋势视图...");
        }

        function handleExportClick() {
            if (!isVipGlobal) return alert("请开通 VIP 权限。");
            alert("报表生成中...");
        }

        refreshData();
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
