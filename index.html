<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA Radar | 2026 全球趋势看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --accent-color: #00c853; --bg-dark: #0b0f19; --card-bg: #161b22; --text-gray: #8b949e; }
        body { 
            background: var(--bg-dark); color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header { 
            padding: 15px 25px; background: var(--card-bg); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #30363d;
        }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--accent-color); letter-spacing: 1px; }
        
        /* 分类筛选 */
        .filter-bar { padding: 10px 25px; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(22, 27, 34, 0.5); }
        .cat-btn {
            background: #21262d; border: 1px solid #30363d; color: var(--text-gray);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .cat-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }

        /* 内容区 */
        .content { flex: 1; position: relative; }
        #chart-container { width: 100%; height: 500px; min-height: 60vh; }

        /* 页脚导航 */
        .footer {
            background: var(--card-bg);
            border-top: 1px solid #30363d;
            padding: 20px 25px;
            text-align: center;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .footer-links a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--accent-color); }
        .copyright { color: #484f58; font-size: 0.8rem; margin-top: 10px; }

        @media (max-width: 600px) { .footer-links { gap: 15px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">YMTEA CLOUD RADAR</div>
        <div style="font-size: 0.8rem; color: var(--text-gray);">数据来源：Cloudflare Radar API</div>
    </header>

    <nav class="filter-bar">
        <button class="cat-btn active" onclick="switchCategory('消费电子', this)">消费电子</button>
        <button class="cat-btn" onclick="switchCategory('家居生活', this)">家居生活</button>
        <button class="cat-btn" onclick="switchCategory('跨境电商', this)">跨境电商</button>
        <button class="cat-btn" onclick="switchCategory('金融科技', this)">金融科技</button>
        <button class="cat-btn" onclick="switchCategory('AI流量', this)">AI流量</button>
    </nav>

    <div class="content">
        <div id="chart-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://ymtea.club" target="_blank">官网首页</a>
            <a href="https://www.ymtea.club/bbs/" target="_blank">云茗荟论坛</a>
            <a href="https://vip.ymtea.club" target="_blank">云茗荟链接</a>
            <a href="https://work.weixin.qq.com/ca/cawcedd71680d6b637" target="_blank">私域咨询</a>
        </div>
        <div class="copyright">
            © 2026 YMTEA LABS. Powered by Cloudflare Edge.
        </div>
    </footer>

    <script>
        const chartDom = document.getElementById('chart-container');
        const myChart = echarts.init(chartDom, 'dark');
        let currentCat = '消费电子';

        async function fetchData(category) {
            try {
                myChart.showLoading({ text: '同步全球节点...', maskColor: 'rgba(11, 15, 25, 0.7)' });
                const res = await fetch(`https://gl.asasasxzc.workers.dev?category=${encodeURIComponent(category)}`, {
                    headers: { 'Authorization': 'Bearer test_token_888' }
                });
                const data = await res.json();
                if (!data || data.length === 0) {
                    myChart.showLoading({ text: '当前分类暂无缓存数据', textColor: '#8b949e' });
                    return;
                }
                renderChart(data, category);
            } catch (err) {
                myChart.showLoading({ text: '联通失败: ' + err.message, textColor: '#ff4444' });
            }
        }

        function renderChart(data, category) {
            myChart.hideLoading();
            myChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                grid: { top: '10%', left: '5%', right: '5%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: data.map(i => i.timestamp ? i.timestamp.split('T')[1].slice(0, 5) : '--:--'),
                    axisLine: { lineStyle: { color: '#30363d' } }
                },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#30363d', type: 'dashed' } } },
                series: [{
                    name: category,
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    data: data.map(i => i.score),
                    lineStyle: { width: 4, color: '#00c853' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0, 200, 83, 0.3)' },
                            { offset: 1, color: 'rgba(0, 200, 83, 0)' }
                        ])
                    }
                }]
            }, true);
        }

        function switchCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchData(cat);
        }

        fetchData(currentCat);
        window.addEventListener('resize', () => myChart.resize());
        setInterval(() => fetchData(currentCat), 300000);
    </script>
</body>
</html>
